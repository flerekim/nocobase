name: IK114 build custom NocoBase image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Fork branch/ref to build, e.g. ik114/v2.1.0-beta.37-ime'
        required: true
        default: 'ik114/v2.1.0-beta.37-ime'
      image_tag:
        description: 'GHCR image tag to publish'
        required: true
        default: '2.1.0-beta.37-ik114.2'
      platforms:
        description: 'Build platforms'
        required: true
        default: 'linux/amd64'

permissions:
  contents: read
  packages: write

concurrency:
  group: ik114-nocobase-image-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout custom source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Start Verdaccio package registry
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/verdaccio/conf" "$RUNNER_TEMP/verdaccio/storage" "$RUNNER_TEMP/verdaccio/plugins"
          cat > "$RUNNER_TEMP/verdaccio/conf/config.yaml" <<'VERDACCIO'
          storage: /verdaccio/storage
          plugins: /verdaccio/plugins
          auth:
            htpasswd:
              file: /verdaccio/conf/htpasswd
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
          packages:
            '@*/*':
              access: $all
              publish: $authenticated
              proxy: npmjs
            '**':
              access: $all
              publish: $authenticated
              proxy: npmjs
          max_body_size: 500mb
          logs:
            - {type: stdout, format: pretty, level: http}
          VERDACCIO
          sed -i 's/^          //' "$RUNNER_TEMP/verdaccio/conf/config.yaml"
          sudo chown -R 10001:65533 "$RUNNER_TEMP/verdaccio"
          docker run -d --name ik114-verdaccio -p 4873:4873 \
            -v "$RUNNER_TEMP/verdaccio/conf:/verdaccio/conf" \
            -v "$RUNNER_TEMP/verdaccio/storage:/verdaccio/storage" \
            -v "$RUNNER_TEMP/verdaccio/plugins:/verdaccio/plugins" \
            verdaccio/verdaccio
          for i in {1..30}; do
            if curl -fsS http://localhost:4873/-/ping; then
              exit 0
            fi
            sleep 2
          done
          docker logs ik114-verdaccio
          exit 1

      - name: Verify IK114 IME patch is present
        run: |
          set -euo pipefail
          file='packages/core/flow-engine/src/components/FieldModelRenderer.tsx'
          grep -F 'props.onChange?.(val);' "$file"
          if grep -F 'composingRef' "$file"; then
            echo 'IME patch verification failed: composingRef guard still exists.' >&2
            exit 1
          fi

      - name: Resolve source metadata
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create full source-build Dockerfile
        run: |
          cat > Dockerfile.ik114-full-source <<'DOCKERFILE'
          FROM node:20-bookworm as builder
          ARG VERDACCIO_URL=http://host.docker.internal:10104/
          ARG COMMIT_HASH
          ARG APPEND_PRESET_LOCAL_PLUGINS
          ARG BEFORE_PACK_NOCOBASE="ls -l"
          ARG PLUGINS_DIRS
          ENV PLUGINS_DIRS=${PLUGINS_DIRS}
          RUN VERDACCIO_URL="$VERDACCIO_URL" node <<'NODE'
          const fs = require('fs');
          const registry = process.env.VERDACCIO_URL.replace(/\/$/, '');
          const body = {
            name: 'test',
            password: 'test',
            email: 'test@nocobase.com',
            type: 'user',
            roles: [],
            date: new Date().toISOString(),
          };
          fetch(`${registry}/-/user/org.couchdb.user:test`, {
            method: 'PUT',
            headers: { 'content-type': 'application/json', accept: 'application/json' },
            body: JSON.stringify(body),
          })
            .then(async (response) => {
              const text = await response.text();
              if (!response.ok) {
                console.error(text);
                process.exit(1);
              }
              const data = JSON.parse(text);
              if (!data.token) {
                console.error('Verdaccio login response did not include a token');
                process.exit(1);
              }
              const url = new URL(registry);
              fs.appendFileSync('/root/.npmrc', `//${url.host}/:_authToken=${data.token}\n`);
            })
            .catch((error) => {
              console.error(error);
              process.exit(1);
            });
          NODE
          RUN apt-get update && apt-get install -y jq git
          WORKDIR /tmp
          COPY . /tmp
          RUN yarn install && yarn build --no-dts
          RUN cd /tmp && NEWVERSION="$(cat lerna.json | jq '.version' | tr -d '"').$(date +'%Y%m%d%H%M%S')" && git checkout -b release-$(date +'%Y%m%d%H%M%S') && yarn lerna version ${NEWVERSION} -y --no-git-tag-version
          RUN git config user.email "test@mail.com" && git config user.name "test" && git add . && git commit -m "chore(versions): test publish packages"
          RUN yarn release:force --registry $VERDACCIO_URL
          RUN yarn global add create-nocobase-app --registry $VERDACCIO_URL
          RUN printf "registry=https://registry.npmjs.org/\n@nocobase:registry=${VERDACCIO_URL}\n" > /root/.npmrc && yarn config set registry https://registry.npmjs.org/
          WORKDIR /app
          RUN cd /app && yarn config set network-timeout 600000 -g && create-nocobase-app my-nocobase-app -a -e APP_ENV=production -e APPEND_PRESET_LOCAL_PLUGINS=$APPEND_PRESET_LOCAL_PLUGINS && cd /app/my-nocobase-app && printf "registry=https://registry.npmjs.org/\n@nocobase:registry=${VERDACCIO_URL}\n" > .npmrc && node -e "const fs=require('fs'); const p='package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.resolutions={...(pkg.resolutions||{}),'pdfjs-dist':'5.4.624'}; fs.writeFileSync(p, JSON.stringify(pkg, null, 2));" && yarn install --production
          WORKDIR /app/my-nocobase-app
          RUN $BEFORE_PACK_NOCOBASE
          RUN cd /app && rm -rf my-nocobase-app/packages/app/client/src/.umi && rm -rf nocobase.tar.gz && tar -zcf ./nocobase.tar.gz -C /app/my-nocobase-app .
          RUN echo "${COMMIT_HASH}" > /tmp/commit_hash.txt
          FROM node:20-bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends wget gnupg ca-certificates && rm -rf /var/lib/apt/lists/*
          RUN echo "deb [signed-by=/usr/share/keyrings/pgdg.asc] http://apt.postgresql.org/pub/repos/apt bookworm-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          RUN wget --quiet -O /usr/share/keyrings/pgdg.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          RUN apt-get update && apt-get install -y --no-install-recommends nginx libaio1 postgresql-client-16 postgresql-client-17 libfreetype6 fontconfig libgssapi-krb5-2 fonts-liberation fonts-noto-cjk unzip && rm -rf /var/lib/apt/lists/*
          RUN rm -rf /etc/nginx/sites-enabled/default
          COPY --from=builder /app/nocobase.tar.gz /app/nocobase.tar.gz
          COPY --from=builder /tmp/commit_hash.txt /app/commit_hash.txt
          RUN mkdir -p /app/nocobase && tar -zxf /app/nocobase.tar.gz -C /app/nocobase && rm /app/nocobase.tar.gz
          RUN wget --no-check-certificate -O /opt/libreoffice24.8.zip https://static-docs.nocobase.com/libreoffice24.8.zip
          RUN wget --no-check-certificate -O /opt/instantclient_19_25.zip https://download.oracle.com/otn_software/linux/instantclient/1925000/instantclient-basic-linux.x64-19.25.0.0.0dbru.zip
          RUN wget --no-check-certificate https://downloads.mysql.com/archives/get/p/23/file/mysql-community-client-core_8.0.39-1debian12_amd64.deb && dpkg -x mysql-community-client-core_8.0.39-1debian12_amd64.deb /tmp/mysql-client && cp /tmp/mysql-client/usr/bin/mysqldump /usr/bin/ && cp /tmp/mysql-client/usr/bin/mysql /usr/bin/ && rm mysql-community-client-core_8.0.39-1debian12_amd64.deb
          WORKDIR /app/nocobase
          COPY ./docker/nocobase/docker-entrypoint.sh /app/
          EXPOSE 80/tcp
          CMD ["/app/docker-entrypoint.sh"]
          DOCKERFILE
          sed -i 's/^          //' Dockerfile.ik114-full-source

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ik114-full-source
          build-args: |
            VERDACCIO_URL=http://localhost:4873/
            COMMIT_HASH=${{ steps.source.outputs.sha }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nocobase:${{ inputs.image_tag }}

      - name: Dump Verdaccio logs
        if: always()
        run: docker logs ik114-verdaccio || true
