name: IK114 patch official NocoBase image

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: 'Official NocoBase image digest to patch'
        required: true
        default: 'nocobase/nocobase@sha256:328589b7412c4eb2c6a1c7d2bd852b2eccad7d20fb0689861260a866c73bdeb3'
      image_tag:
        description: 'GHCR image tag to publish'
        required: true
        default: '2.1.0-beta.37-ik114-officialbase.1'
      platforms:
        description: 'Build platforms'
        required: true
        default: 'linux/amd64'

permissions:
  contents: read
  packages: write

concurrency:
  group: ik114-patch-official-image-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create official-base patch Dockerfile
        run: |
          cat > Dockerfile.ik114-ime-officialbase <<'DOCKERFILE'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          ARG BASE_IMAGE
          ENV IK114_BASE_IMAGE=${BASE_IMAGE}

          RUN node <<'NODE'
          const fs = require('fs');
          const patches = [
            {
              file: '/app/nocobase/node_modules/@nocobase/app/dist/client/v2/assets/index-d358751d.js',
              from: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1),r=l=>{let r;if(r=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:r}),!n.current){var o;null==(o=e.onChange)||o.call(e,r)}},o={onCompositionStart:()=>{n.current=!0},onCompositionEnd:function(t){let l=!(arguments.length>1)||void 0===arguments[1]||arguments[1];n.current=!1,l&&e.onChange(t)},...A().omit(l,tV),onChange:r};',
              to: 'function tz(e){let{model:t,...l}=e,r=l=>{let r;r=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:r});var o;null==(o=e.onChange)||o.call(e,r)},o={...A().omit(l,tV),onChange:r};',
            },
            {
              file: '/app/nocobase/node_modules/@nocobase/app/dist/client/assets/index-7bb4b4a6.js',
              from: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1),o=l=>{let o;if(o=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:o}),!n.current){var r;null==(r=e.onChange)||r.call(e,o)}},r={onCompositionStart:()=>{n.current=!0},onCompositionEnd:function(t){let l=!(arguments.length>1)||void 0===arguments[1]||arguments[1];n.current=!1,l&&e.onChange(t)},...k().omit(l,tV),onChange:o};',
              to: 'function tz(e){let{model:t,...l}=e,o=l=>{let o;o=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:o});var r;null==(r=e.onChange)||r.call(e,o)},r={...k().omit(l,tV),onChange:o};',
            },
          ];
          for (const patch of patches) {
            let source = fs.readFileSync(patch.file, 'utf8');
            const count = source.split(patch.from).length - 1;
            if (count !== 1) {
              throw new Error(`${patch.file}: expected one match, found ${count}`);
            }
            source = source.replace(patch.from, patch.to);
            fs.writeFileSync(patch.file, source);
          }
          fs.writeFileSync('/app/ik114_patch_info.txt', [
            'ik114 Korean/CJK IME patch',
            `base=${process.env.IK114_BASE_IMAGE || 'unknown'}`,
            'source-pr=https://github.com/nocobase/nocobase/pull/9194',
          ].join('\n') + '\n');
          NODE

          RUN node <<'NODE'
          const fs = require('fs');
          const checks = [
            {
              file: '/app/nocobase/node_modules/@nocobase/app/dist/client/v2/assets/index-d358751d.js',
              mustHave: 'function tz(e){let{model:t,...l}=e,r=l=>{let r;r=l&&l.target&&void 0!==l.target.value?',
              mustNotHave: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1)',
            },
            {
              file: '/app/nocobase/node_modules/@nocobase/app/dist/client/assets/index-7bb4b4a6.js',
              mustHave: 'function tz(e){let{model:t,...l}=e,o=l=>{let o;o=l&&l.target&&void 0!==l.target.value?',
              mustNotHave: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1)',
            },
          ];
          for (const check of checks) {
            const source = fs.readFileSync(check.file, 'utf8');
            if (!source.includes(check.mustHave)) throw new Error(`${check.file}: patched marker missing`);
            if (source.includes(check.mustNotHave)) throw new Error(`${check.file}: old composing guard still present`);
          }
          for (const plugin of ['@nocobase/plugin-idp-oauth', '@nocobase/plugin-mcp-server']) {
            const pkg = `/app/nocobase/node_modules/${plugin}/package.json`;
            if (!fs.existsSync(pkg)) throw new Error(`${plugin} package missing`);
          }
          NODE
          DOCKERFILE
          sed -i 's/^          //' Dockerfile.ik114-ime-officialbase

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push patched official image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ik114-ime-officialbase
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nocobase:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=IK114 NocoBase official beta-full image with Korean/CJK IME patch

      - name: Inspect pushed image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/nocobase:${{ inputs.image_tag }}