            },
            {
              name: 'legacy ImeAwareInputFieldModel',
              from: 'var n=l(74848),o=l(11869),r=l(95725);l(96540);var i=l(44329),a=l(81486);class s extends a.o{render(){return(0,n.jsx)(r.A,{...this.props})}}',
              to: 'var n=l(74848),o=l(11869),r=l(95725),d=l(96540);var i=l(44329),a=l(81486);function u(e){var t,l;return(null==(t=e.currentTarget)?void 0:t.value)??(null==(l=e.target)?void 0:l.value)}function c(e){let{value:t,defaultValue:l,onChange:o,onCompositionStart:i,onCompositionUpdate:a,onCompositionEnd:s,...c}=e,p=Object.prototype.hasOwnProperty.call(e,"value"),m=(0,d.useRef)(!1),[h,f]=(0,d.useState)(t??l);return(0,d.useEffect)(()=>{p&&!m.current&&f(t)},[p,t]),(0,n.jsx)(r.A,{...c,value:h,onChange:e=>{f(u(e)),null==o||o(e)},onCompositionStart:e=>{m.current=!0,f(u(e)),null==i||i(e)},onCompositionUpdate:e=>{m.current=!0,f(u(e)),null==a||a(e)},onCompositionEnd:e=>{m.current=!1,f(u(e)),null==s||s(e)}})}class s extends a.o{render(){return(0,n.jsx)(c,{...this.props})}}',
            },
            {
              name: 'v2 FieldModelRenderer pending IME protection',
              from: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1),r=l=>{let r;if(r=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:r}),!n.current){var o;null==(o=e.onChange)||o.call(e,r)}},o={onCompositionStart:()=>{n.current=!0},onCompositionEnd:function(t){let l=!(arguments.length>1)||void 0===arguments[1]||arguments[1];n.current=!1,l&&e.onChange(t)},...A().omit(l,tV),onChange:r};return(0,f.useEffect)(()=>{t&&t.setProps(o)},[o]),(0,h.jsx)(tL,{model:t,...l})}',
              to: 'const ik114NoPending=Symbol("NO_PENDING_INPUT_VALUE");function ik114GetChangeValue(e,t=null){return"undefined"==typeof e?t:e&&e.target&&void 0!==e.target.value?e.target.value:e&&e.currentTarget&&void 0!==e.currentTarget.value?e.currentTarget.value:e&&e.target&&void 0!==e.target.checked?e.target.checked:e&&e.currentTarget&&void 0!==e.currentTarget.checked?e.currentTarget.checked:"string"==typeof e||"number"==typeof e||"boolean"==typeof e||"object"==typeof e&&!(e instanceof Event)?e:null}function ik114GetOuterChangeArg(e,t){return e&&e.target&&(void 0!==e.target.value||void 0!==e.target.checked)?e:t}function tz(e){let{model:t,onChange:l,onCompositionStart:n,onCompositionUpdate:r,onCompositionEnd:o,...i}=e,a=(0,f.useRef)(!1),s=(0,f.useRef)(i.value),d=(0,f.useRef)(ik114NoPending),u=(0,f.useRef)(null),c=(0,f.useCallback)(e=>{d.current=e,u.current&&clearTimeout(u.current),u.current=setTimeout(()=>{d.current=ik114NoPending,u.current=null},1e3)},[]),p=(0,f.useCallback)(e=>{let n=ik114GetChangeValue(e);s.current=n,c(n),t.setProps({value:n}),null==l||l(ik114GetOuterChangeArg(e,n))},[c,t,l]),m=(0,f.useCallback)(e=>{a.current=!0,null==n||n(e)},[n]),g=(0,f.useCallback)(e=>{a.current=!0,null==r||r(e)},[r]),v=(0,f.useCallback)(e=>{a.current=!1,null==o||o(e)},[o]),y=(0,f.useMemo)(()=>({...A().omit(i,tV),onChange:p,onCompositionStart:m,onCompositionUpdate:g,onCompositionEnd:v}),[p,m,g,v,i]);return(0,f.useEffect)(()=>{if(!t)return;let e={...y};if(Object.prototype.hasOwnProperty.call(e,"value")){let t=d.current,l=a.current||t!==ik114NoPending&&!Object.is(e.value,t);l&&!Object.is(e.value,s.current)?e.value=s.current:(s.current=e.value,t!==ik114NoPending&&Object.is(e.value,t)&&(d.current=ik114NoPending,u.current&&(clearTimeout(u.current),u.current=null)))}t.setProps(e)},[t,y]),(0,f.useEffect)(()=>()=>{u.current&&clearTimeout(u.current)},[]),(0,h.jsx)(tL,{model:t,...i})}',
            },
            {
              name: 'legacy FieldModelRenderer pending IME protection',
              from: 'function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1),o=l=>{let o;if(o=l&&l.target&&void 0!==l.target.value?l.target.value:"string"!=typeof l&&"number"!=typeof l&&"boolean"!=typeof l&&("object"!=typeof l||l instanceof Event)?null:l,t.setProps({value:o}),!n.current){var r;null==(r=e.onChange)||r.call(e,o)}},r={onCompositionStart:()=>{n.current=!0},onCompositionEnd:function(t){let l=!(arguments.length>1)||void 0===arguments[1]||arguments[1];n.current=!1,l&&e.onChange(t)},...k().omit(l,tV),onChange:o};return(0,f.useEffect)(()=>{t&&t.setProps(r)},[r]),(0,m.jsx)(t_,{model:t,...l})}',
              to: 'const ik114NoPending=Symbol("NO_PENDING_INPUT_VALUE");function ik114GetChangeValue(e,t=null){return"undefined"==typeof e?t:e&&e.target&&void 0!==e.target.value?e.target.value:e&&e.currentTarget&&void 0!==e.currentTarget.value?e.currentTarget.value:e&&e.target&&void 0!==e.target.checked?e.target.checked:e&&e.currentTarget&&void 0!==e.currentTarget.checked?e.currentTarget.checked:"string"==typeof e||"number"==typeof e||"boolean"==typeof e||"object"==typeof e&&!(e instanceof Event)?e:null}function ik114GetOuterChangeArg(e,t){return e&&e.target&&(void 0!==e.target.value||void 0!==e.target.checked)?e:t}function tz(e){let{model:t,onChange:l,onCompositionStart:n,onCompositionUpdate:o,onCompositionEnd:r,...i}=e,a=(0,f.useRef)(!1),s=(0,f.useRef)(i.value),d=(0,f.useRef)(ik114NoPending),u=(0,f.useRef)(null),c=(0,f.useCallback)(e=>{d.current=e,u.current&&clearTimeout(u.current),u.current=setTimeout(()=>{d.current=ik114NoPending,u.current=null},1e3)},[]),p=(0,f.useCallback)(e=>{let n=ik114GetChangeValue(e);s.current=n,c(n),t.setProps({value:n}),null==l||l(ik114GetOuterChangeArg(e,n))},[c,t,l]),g=(0,f.useCallback)(e=>{a.current=!0,null==n||n(e)},[n]),v=(0,f.useCallback)(e=>{a.current=!0,null==o||o(e)},[o]),y=(0,f.useCallback)(e=>{a.current=!1,null==r||r(e)},[r]),b=(0,f.useMemo)(()=>({...k().omit(i,tV),onChange:p,onCompositionStart:g,onCompositionUpdate:v,onCompositionEnd:y}),[p,g,v,y,i]);return(0,f.useEffect)(()=>{if(!t)return;let e={...b};if(Object.prototype.hasOwnProperty.call(e,"value")){let t=d.current,l=a.current||t!==ik114NoPending&&!Object.is(e.value,t);l&&!Object.is(e.value,s.current)?e.value=s.current:(s.current=e.value,t!==ik114NoPending&&Object.is(e.value,t)&&(d.current=ik114NoPending,u.current&&(clearTimeout(u.current),u.current=null)))}t.setProps(e)},[t,b]),(0,f.useEffect)(()=>()=>{u.current&&clearTimeout(u.current)},[]),(0,m.jsx)(t_,{model:t,...i})}',
            },
          ];

          const patchedFiles = [];
          for (const patch of patches) {
            const matches = [];
            for (const file of files) {
              const source = fs.readFileSync(file, 'utf8');
              const count = source.split(patch.from).length - 1;
              if (count > 0) matches.push({ file, count });
            }
            const total = matches.reduce((sum, item) => sum + item.count, 0);
            if (total !== 1 || matches.length !== 1) {
              throw new Error(`${patch.name}: expected exactly one match, got ${total} in ${JSON.stringify(matches)}`);
            }
            const match = matches[0];
            const source = fs.readFileSync(match.file, 'utf8').replace(patch.from, patch.to);
            fs.writeFileSync(match.file, source);
            patchedFiles.push(match.file);
          }

          fs.writeFileSync('/app/ik114_patch_info.txt', [
            'ik114 Korean/CJK IME patch v4',
            `base=${process.env.IK114_BASE_IMAGE || 'unknown'}`,
            'source-pr=https://github.com/nocobase/nocobase/pull/9194',
            'fix=ImeAwareInput wrapper plus FieldModelRenderer pending input value protection',
            ...patchedFiles.map((file) => `patched=${file}`),
          ].join('\n') + '\n');
          NODE

          RUN node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir, out = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full, out);
              else if (entry.isFile() && full.endsWith('.js')) out.push(full);
            }
            return out;
          }

          const root = '/app/nocobase/node_modules/@nocobase/app/dist/client';
          const joined = walk(root).map((file) => fs.readFileSync(file, 'utf8')).join('\n');
          for (const marker of [
            'function c(e){let{value:t,defaultValue:l,onChange:r,onCompositionStart:i,onCompositionUpdate:a,onCompositionEnd:s,...c}=e',
            'function c(e){let{value:t,defaultValue:l,onChange:o,onCompositionStart:i,onCompositionUpdate:a,onCompositionEnd:s,...c}=e',
            'ik114NoPending=Symbol("NO_PENDING_INPUT_VALUE")',
            'ik114GetOuterChangeArg',
            'Object.prototype.hasOwnProperty.call(e,"value")',
          ]) {
            if (!joined.includes(marker)) throw new Error(`patch marker missing: ${marker}`);
          }
          if (joined.includes('n.current=!1,l&&e.onChange(t)')) {
            throw new Error('old compositionEnd form onChange marker still present');
          }
          if (joined.includes('function tz(e){let{model:t,...l}=e,n=(0,f.useRef)(!1)')) {
            throw new Error('old FieldModelRenderer composing guard still present');
          }
          for (const plugin of ['@nocobase/plugin-idp-oauth', '@nocobase/plugin-mcp-server']) {
            const pkg = `/app/nocobase/node_modules/${plugin}/package.json`;
            if (!fs.existsSync(pkg)) throw new Error(`${plugin} package missing`);
          }
          for (const pkgPath of [
            '/app/nocobase/node_modules/@nocobase/server/package.json',
            '/app/nocobase/node_modules/@nocobase/app/package.json',
            '/app/nocobase/node_modules/@nocobase/plugin-client/package.json',
          ]) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            console.log(`${pkgPath} ${pkg.version}`);
          }
          NODE
          DOCKERFILE
          sed -i 's/^          //' Dockerfile.ik114-ime-officialbase

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push patched official image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ik114-ime-officialbase
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nocobase:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=IK114 NocoBase official beta-full image with Korean/CJK IME patch

      - name: Inspect pushed image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/nocobase:${{ inputs.image_tag }}