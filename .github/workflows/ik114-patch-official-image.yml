name: IK114 patch official NocoBase image

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: 'Official NocoBase image digest to patch'
        required: true
        default: 'nocobase/nocobase@sha256:a0498318ca5d4b1f7577522b7fea59fbdbcb4a08d4b5901322305406f90501ab'
      image_tag:
        description: 'GHCR image tag to publish'
        required: true
        default: '2.1.0-beta.37-ik114-officialbase.4'
      platforms:
        description: 'Build platforms'
        required: true
        default: 'linux/amd64'

permissions:
  contents: read
  packages: write

concurrency:
  group: ik114-patch-official-image-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create official-base patch Dockerfile
        run: |
          cat > Dockerfile.ik114-ime-officialbase <<'DOCKERFILE'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          ARG BASE_IMAGE
          ENV IK114_BASE_IMAGE=${BASE_IMAGE}

          RUN node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir, out = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full, out);
              else if (entry.isFile() && full.endsWith('.js')) out.push(full);
            }
            return out;
          }

          const root = '/app/nocobase/node_modules/@nocobase/app/dist/client';
          const files = walk(root);
          const patches = [
            {
              name: 'v2 ImeAwareInputFieldModel',
              from: 'var n=l(74848),r=l(11869),o=l(95725);l(96540);var i=l(44329),a=l(81486);class s extends a.o{render(){return(0,n.jsx)(o.A,{...this.props})}}',
